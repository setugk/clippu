<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Clippery">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="/manifest.json">
<title>Clippery</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23111'/><text x='16' y='23' text-anchor='middle' font-family='-apple-system,sans-serif' font-weight='600' font-size='19' fill='white'>C</text></svg>">
<link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>

<div class="app" id="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="app-title">Clippery</span>
      <div class="sidebar-header-actions">
        <button class="icon-btn" id="compose-btn" title="New note">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </button>
        <button class="icon-btn" id="new-folder-btn" title="New folder">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
        </button>
        <button class="icon-btn" id="settings-btn" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="search-input" placeholder="Search notes…" autocomplete="off">
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="nav-section">
        <button class="nav-item nav-all-notes" id="nav-all-notes" data-view="all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          All Notes
          <span class="nav-count" id="all-notes-count"></span>
        </button>
        <button class="nav-item" id="nav-recents">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Recents
        </button>
      </div>

      <div class="nav-section">
        <div class="nav-section-header">
          <span>Folders</span>
        </div>
        <div id="folder-tree"></div>
      </div>

      <div class="nav-section" id="tags-section">
        <button class="subfolder-section-toggle" id="tags-section-toggle">
          <svg class="subfolder-toggle-chev open" id="tags-toggle-chev" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          Tags
          <span class="subfolder-section-count" id="tags-section-count"></span>
        </button>
        <div id="tags-list"></div>
      </div>
    </nav>
  </aside>
  <div class="resize-handle" id="resize-sidebar-handle"></div>

  <!-- ── Notes list (middle pane) ── -->
  <div class="notes-pane" id="notes-pane">
    <div class="notes-pane-header">
      <button class="icon-btn back-btn" id="notes-back-btn" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2 class="pane-title" id="pane-title">All Notes</h2>
      <div class="notes-header-actions">
        <div class="pane-dropdown-wrapper">
          <button class="icon-btn" id="sort-btn" title="Sort">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
          </button>
          <div class="pane-dropdown hidden" id="sort-menu">
            <button data-sort="updated_desc">Newest edited</button>
            <button data-sort="updated_asc">Oldest edited</button>
            <button data-sort="created_desc">Newest created</button>
            <button data-sort="created_asc">Oldest created</button>
          </div>
        </div>
        <div class="pane-dropdown-wrapper">
          <button class="icon-btn" id="new-note-btn" title="New">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <div class="pane-dropdown hidden" id="new-item-menu">
            <button id="new-note-option">New note</button>
            <button id="new-subfolder-option">New subfolder</button>
          </div>
        </div>
      </div>
    </div>
    <div class="notes-pane-search">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="search" id="pane-search-input" placeholder="Search…" autocomplete="off">
    </div>
    <div class="notes-list" id="notes-list"></div>
  </div>
  <div class="resize-handle" id="resize-notes-handle"></div>

  <!-- ── Editor (right pane) ── -->
  <div class="editor-pane" id="editor-pane">
    <div class="editor-toolbar">
      <button class="icon-btn" id="editor-back-btn" title="Back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="autosave-indicator" id="autosave-indicator"></span>
      <button class="icon-btn editor-save-btn" id="editor-save-btn" title="Save and go back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <div class="overflow-wrapper">
        <button class="icon-btn" id="editor-menu-btn" title="More options">
          <svg width="4" height="16" viewBox="0 0 4 20" fill="currentColor"><circle cx="2" cy="2" r="2"/><circle cx="2" cy="10" r="2"/><circle cx="2" cy="18" r="2"/></svg>
        </button>
        <div class="overflow-menu hidden" id="overflow-menu">
          <button id="copy-note-btn">Copy to clipboard</button>
          <button id="move-note-btn">Move to folder…</button>
          <button id="delete-note-btn" class="danger">Delete note</button>
        </div>
      </div>
    </div>

    <div class="editor-body" id="editor-body">
      <input type="text" class="note-title-input" id="note-title" placeholder="Title" autocomplete="off" spellcheck="true">
      <div class="note-tags-row">
        <div class="tags-chips" id="tags-chips"></div>
        <input type="text" class="tag-input" id="tag-input" placeholder="+ add tag" autocomplete="off">
        <div class="tag-suggestions hidden" id="tag-suggestions"></div>
      </div>
      <div class="note-dates" id="note-dates"></div>
      <div class="note-body-wrap">
        <div class="note-body-placeholder" id="note-body-placeholder" aria-hidden="true">Start writing…</div>
        <div class="note-body-input" id="note-body" contenteditable="true" role="textbox" spellcheck="true"></div>
      </div>
    </div>

    <div class="editor-empty-state" id="editor-empty-state">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <p>Select a note or create a new one</p>
    </div>
  </div>

</div>

<!-- ── Move to folder modal ── -->
<div class="modal-overlay hidden" id="move-modal">
  <div class="modal" id="move-modal-content">
    <div class="modal-header">
      <span>Move to folder</span>
      <button class="icon-btn" id="move-modal-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="move-folder-list"></div>
  </div>
</div>

<!-- ── New/rename folder modal ── -->
<div class="modal-overlay hidden" id="folder-modal">
  <div class="modal" id="folder-modal-content">
    <div class="modal-header">
      <span id="folder-modal-title">New folder</span>
      <button class="icon-btn" id="folder-modal-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="text" class="modal-input" id="folder-name-input" placeholder="Folder name" autocomplete="off">
      <div class="modal-actions">
        <button class="btn-secondary" id="folder-cancel-btn">Cancel</button>
        <button class="btn-primary" id="folder-confirm-btn">Create</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Settings modal ── -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal settings-modal">
    <div class="modal-header">
      <span>Settings</span>
      <button class="icon-btn" id="settings-modal-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-section-title">Appearance</div>
        <div class="settings-row">
          <span>Dark mode</span>
          <button class="toggle-switch" id="settings-dark-toggle"></button>
        </div>
        <div class="settings-row" style="margin-top:10px">
          <span>List date</span>
          <div class="date-display-picker" id="date-display-picker">
            <button data-value="created">Created</button>
            <button data-value="updated">Last edited</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">Tags</div>
        <div id="settings-tags-list"></div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">Data</div>
        <div class="settings-row">
          <span>Export all notes</span>
          <a href="/api/export" class="settings-export-link">Download JSON</a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Floating format bar ── -->
<div class="floating-format-bar hidden" id="format-bar">
  <button class="fmt-btn" data-fmt="bold" title="Bold (⌘B)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 12a4 4 0 0 0 0-8H6v8"/><path d="M15 20a4 4 0 0 0 0-8H6v8z"/></svg>
  </button>
  <button class="fmt-btn" data-fmt="italic" title="Italic (⌘I)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
  </button>
  <button class="fmt-btn" data-fmt="underline" title="Underline (⌘U)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><line x1="4" y1="20" x2="20" y2="20"/></svg>
  </button>
  <button class="fmt-btn" data-fmt="strike" title="Strikethrough (⌘⇧S)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
  </button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" data-fmt="bullet" title="Bullet list">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="fmt-btn" data-fmt="numbered" title="Numbered list">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-2-2-2"/></svg>
  </button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" data-fmt="indent" title="Indent">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 3 16"/><line x1="21" y1="12" x2="11" y2="12"/><line x1="21" y1="6" x2="11" y2="6"/><line x1="21" y1="18" x2="11" y2="18"/></svg>
  </button>
  <button class="fmt-btn" data-fmt="outdent" title="Outdent">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 8 3 12 7 16"/><line x1="21" y1="12" x2="11" y2="12"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
  </button>
</div>

<div class="toast hidden" id="toast"></div>

<script src="/static/app.js?v=2"></script>
</body>
</html>
